# HTTP → HTTPS редирект для всех доменов
server {
    listen 80;
    server_name cisis-workspace.ru www.cisis-workspace.ru cisisworkspace.ru www.cisisworkspace.ru;
    return 301 https://cisis-workspace.ru$request_uri;
}

# Основной сервер — HTTPS
server {
    listen 443 ssl;
    server_name cisis-workspace.ru;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/cisis-workspace.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cisis-workspace.ru/privkey.pem;

    # Редирект с корня на /workspace/
    location = / {
        return 301 https://cisis-workspace.ru/workspace/;
    }

    # Статика
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Медиафайлы
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    # WebSocket → ASGI (Daphne)
    location /ws/ {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Всё остальное → Django
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# www и второй домен → основной
server {
    listen 443 ssl;
    server_name www.cisis-workspace.ru cisisworkspace.ru www.cisisworkspace.ru;

    ssl_certificate     /etc/letsencrypt/live/cisis-workspace.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cisis-workspace.ru/privkey.pem;

    return 301 https://cisis-workspace.ru$request_uri;
}
