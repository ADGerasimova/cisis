<!-- ═══════════════════════════════════════════════════════════
     _chat_sidebar.html — Плавающая кнопка + выдвижная панель чата
     Включается через include 'core/_chat_sidebar.html' в любом шаблоне.
     v3.40.0
     ═══════════════════════════════════════════════════════════ -->

<!-- Плавающая кнопка -->
<button id="chat-fab" onclick="ChatApp.toggle()" title="Чат">
    💬
    <span id="chat-fab-badge" class="chat-fab-badge" style="display:none;">0</span>
</button>

<!-- Оверлей -->
<div id="chat-overlay" class="chat-overlay" onclick="ChatApp.close()"></div>

<!-- Панель чата -->
<div id="chat-panel" class="chat-panel">

    <!-- ═══ Экран 1: Список комнат ═══ -->
    <div id="chat-rooms-screen" class="chat-screen">
        <div class="chat-header">
            <span class="chat-header-title">💬 Чат</span>
            <button class="chat-header-btn" onclick="ChatApp.showNewChat()" title="Новый чат">＋</button>
            <button class="chat-header-btn" onclick="ChatApp.close()" title="Закрыть">✕</button>
        </div>
        <div id="chat-rooms-list" class="chat-rooms-list">
            <div class="chat-loading">Загрузка...</div>
        </div>
    </div>

    <!-- ═══ Экран 2: Сообщения ═══ -->
    <div id="chat-messages-screen" class="chat-screen" style="display:none;">
        <div class="chat-header">
            <button class="chat-header-btn" onclick="ChatApp.backToRooms()">←</button>
            <span id="chat-room-title" class="chat-header-title"></span>
            <button class="chat-header-btn" onclick="ChatApp.showRoomInfo()" title="Участники">👥</button>
        </div>
        <div id="chat-messages-container" class="chat-messages-container">
            <div id="chat-load-more" class="chat-load-more" style="display:none;">
                <button onclick="ChatApp.loadMore()">Загрузить ранее</button>
            </div>
            <div id="chat-messages" class="chat-messages"></div>
        </div>
        <div id="chat-typing" class="chat-typing" style="display:none;"></div>
        <div class="chat-input-area">
            <textarea id="chat-input" class="chat-input" placeholder="Сообщение..." rows="1"
                      onkeydown="ChatApp.onKeyDown(event)"
                      oninput="ChatApp.autoResize(this)"></textarea>
            <button class="chat-send-btn" onclick="ChatApp.sendMessage()">➤</button>
        </div>
    </div>

    <!-- ═══ Экран 3: Создание чата ═══ -->
    <div id="chat-new-screen" class="chat-screen" style="display:none;">
        <div class="chat-header">
            <button class="chat-header-btn" onclick="ChatApp.backToRooms()">←</button>
            <span class="chat-header-title">Новый чат</span>
        </div>
        <div class="chat-new-body">
            <input id="chat-search-users" class="chat-search-input" placeholder="Поиск сотрудника..."
                   oninput="ChatApp.searchUsers(this.value)">
            <div id="chat-search-results" class="chat-search-results"></div>

            <div id="chat-new-group-section" style="display:none; margin-top: 16px;">
                <input id="chat-group-name" class="chat-search-input" placeholder="Название группы..."
                       style="margin-bottom:8px;">
                <div id="chat-selected-members" class="chat-selected-members"></div>
                <button class="chat-create-group-btn" onclick="ChatApp.createGroup()">Создать группу</button>
            </div>
        </div>
    </div>

    <!-- ═══ Экран 4: Участники комнаты ═══ -->
    <div id="chat-info-screen" class="chat-screen" style="display:none;">
        <div class="chat-header">
            <button class="chat-header-btn" onclick="ChatApp.backToMessages()">←</button>
            <span class="chat-header-title">Участники</span>
        </div>
        <div id="chat-members-list" class="chat-members-list"></div>
        <div id="chat-leave-area" style="padding: 12px; display: none;">
            <button class="chat-leave-btn" onclick="ChatApp.leaveRoom()">Покинуть чат</button>
        </div>
    </div>
</div>

<script>
const ChatApp = (() => {
    // ── State ──
    let ws = null;
    let currentRoomId = null;
    let currentRoomType = null;
    let rooms = [];
    let selectedMembers = [];  // для создания группы
    let typingTimeout = null;
    let unreadPollInterval = null;
    let oldestMessageId = null;
    const CSRF = '{{ csrf_token }}';

    // ── Panel ──

    function toggle() {
        const panel = document.getElementById('chat-panel');
        const overlay = document.getElementById('chat-overlay');
        if (panel.classList.contains('open')) {
            close();
        } else {
            panel.classList.add('open');
            overlay.classList.add('open');
            loadRooms();
            startUnreadPolling();
        }
    }

    function close() {
        document.getElementById('chat-panel').classList.remove('open');
        document.getElementById('chat-overlay').classList.remove('open');
        disconnectWs();
        showScreen('chat-rooms-screen');
        stopUnreadPolling();
    }

    function showScreen(id) {
        document.querySelectorAll('.chat-screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }

    // ── Rooms ──

    async function loadRooms() {
        try {
            const res = await fetch('/api/chat/rooms/');
            const data = await res.json();
            rooms = data.rooms || [];
            renderRooms();
        } catch (e) {
            console.error('Chat: loadRooms error', e);
        }
    }

    function renderRooms() {
        const el = document.getElementById('chat-rooms-list');
        if (!rooms.length) {
            el.innerHTML = '<div class="chat-loading">Нет чатов</div>';
            return;
        }

        el.innerHTML = rooms.map(r => `
            <div class="chat-room-item" onclick="ChatApp.openRoom(${r.id}, '${escHtml(r.name)}', '${r.type}')">
                <div class="chat-room-icon">${r.icon}</div>
                <div class="chat-room-info">
                    <div class="chat-room-name">${escHtml(r.name)}</div>
                    ${r.last_message ? `<div class="chat-room-preview">${escHtml(r.last_message.sender)}: ${escHtml(r.last_message.text)}</div>` : ''}
                </div>
                <div class="chat-room-meta">
                    ${r.last_message ? `<span class="chat-room-time">${r.last_message.time}</span>` : ''}
                    ${r.unread ? `<span class="chat-room-badge">${r.unread}</span>` : ''}
                </div>
            </div>
        `).join('');
    }

    // ── Messages ──

    async function openRoom(roomId, roomName, roomType) {
        currentRoomId = roomId;
        currentRoomType = roomType;
        oldestMessageId = null;

        document.getElementById('chat-room-title').textContent = roomName;
        document.getElementById('chat-messages').innerHTML = '';
        document.getElementById('chat-load-more').style.display = 'none';
        showScreen('chat-messages-screen');

        await loadMessages();
        connectWs(roomId);

        // Фокус на поле ввода
        document.getElementById('chat-input').focus();
    }

    async function loadMessages(before) {
        let url = `/api/chat/rooms/${currentRoomId}/messages/?limit=50`;
        if (before) url += `&before=${before}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            renderMessages(data.messages, !!before);
            document.getElementById('chat-load-more').style.display = data.has_more ? '' : 'none';

            if (data.messages.length) {
                oldestMessageId = data.messages[0].id;
            }

            // Скроллим вниз при первой загрузке
            if (!before) scrollToBottom();
        } catch (e) {
            console.error('Chat: loadMessages error', e);
        }
    }

    function loadMore() {
        if (oldestMessageId) loadMessages(oldestMessageId);
    }

    function renderMessages(messages, prepend) {
        const container = document.getElementById('chat-messages');

        const html = messages.map(m => {
            let out = '';
            if (m.date) {
                out += `<div class="chat-date-divider">${m.date}</div>`;
            }
            out += `<div class="chat-msg ${m.is_own ? 'own' : 'other'}">`;
            if (!m.is_own && m.show_sender) {
                out += `<div class="chat-msg-sender">${escHtml(m.sender_name)}</div>`;
            }
            out += `${escHtml(m.text)}`;
            out += `<div class="chat-msg-time">${m.time}</div>`;
            out += `</div>`;
            return out;
        }).join('');

        if (prepend) {
            container.insertAdjacentHTML('afterbegin', html);
        } else {
            container.insertAdjacentHTML('beforeend', html);
        }
    }

    function appendMessage(data) {
        const container = document.getElementById('chat-messages');
        let html = `<div class="chat-msg ${data.is_own ? 'own' : 'other'}">`;
        if (!data.is_own) {
            html += `<div class="chat-msg-sender">${escHtml(data.sender_name)}</div>`;
        }
        html += `${escHtml(data.text)}`;
        html += `<div class="chat-msg-time">${data.created_at}</div>`;
        html += `</div>`;
        container.insertAdjacentHTML('beforeend', html);
        scrollToBottom();

        // Помечаем как прочитанное
        if (!data.is_own && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'mark_read' }));
        }
    }

    function scrollToBottom() {
        const c = document.getElementById('chat-messages-container');
        requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
    }

    // ── WebSocket ──

    function connectWs(roomId) {
        disconnectWs();

        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/chat/${roomId}/`);

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if (data.type === 'message') {
                appendMessage(data);
                // Обновляем превью в списке комнат
                updateRoomPreview(roomId, data.text, data.sender_name, data.created_at);
            } else if (data.type === 'typing') {
                showTyping(data.sender_name);
            }
        };

        ws.onclose = () => { ws = null; };
        ws.onerror = (e) => { console.error('WS error', e); };
    }

    function disconnectWs() {
        if (ws) {
            ws.close();
            ws = null;
        }
    }

    // ── Send ──

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

        ws.send(JSON.stringify({ type: 'message', text }));
        input.value = '';
        input.style.height = 'auto';
    }

    function onKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
        // Typing indicator
        if (ws && ws.readyState === WebSocket.OPEN && e.key !== 'Enter') {
            clearTimeout(typingTimeout);
            ws.send(JSON.stringify({ type: 'typing' }));
            typingTimeout = setTimeout(() => {}, 2000);
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    }

    function showTyping(name) {
        const el = document.getElementById('chat-typing');
        el.textContent = `${name} печатает...`;
        el.style.display = '';
        clearTimeout(el._hide);
        el._hide = setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    // ── New Chat ──

    function showNewChat() {
        selectedMembers = [];
        document.getElementById('chat-search-users').value = '';
        document.getElementById('chat-search-results').innerHTML = '';
        document.getElementById('chat-new-group-section').style.display = 'none';
        document.getElementById('chat-selected-members').innerHTML = '';
        showScreen('chat-new-screen');
        document.getElementById('chat-search-users').focus();
    }

    let searchTimeout = null;
    async function searchUsers(q) {
        clearTimeout(searchTimeout);
        if (q.length < 2) {
            document.getElementById('chat-search-results').innerHTML = '';
            return;
        }
        searchTimeout = setTimeout(async () => {
            try {
                const res = await fetch(`/api/chat/search-users/?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                renderSearchResults(data.users || []);
            } catch (e) {
                console.error('Chat: searchUsers error', e);
            }
        }, 300);
    }

    function renderSearchResults(users) {
        const el = document.getElementById('chat-search-results');
        if (!users.length) {
            el.innerHTML = '<div class="chat-loading" style="padding:16px;">Не найдено</div>';
            return;
        }
        el.innerHTML = users.map(u => `
            <div class="chat-search-item">
                <div>
                    <div class="chat-search-item-name">${escHtml(u.name)}</div>
                    <div class="chat-search-item-lab">${escHtml(u.lab)}</div>
                </div>
                <div class="chat-search-item-actions">
                    <button class="btn-dm" onclick="ChatApp.startDirect(${u.id}, '${escJs(u.name)}')">Написать</button>
                    <button class="btn-add-group" onclick="ChatApp.addToGroup(${u.id}, '${escJs(u.name)}')">+ В группу</button>
                </div>
            </div>
        `).join('');
    }

    async function startDirect(userId, name) {
        try {
            const res = await fetch('/api/chat/direct/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
                body: JSON.stringify({ user_id: userId }),
            });
            const data = await res.json();
            if (data.room_id) {
                openRoom(data.room_id, name, 'DIRECT');
            }
        } catch (e) {
            console.error('Chat: startDirect error', e);
        }
    }

    function addToGroup(userId, name) {
        if (selectedMembers.find(m => m.id === userId)) return;
        selectedMembers.push({ id: userId, name });
        document.getElementById('chat-new-group-section').style.display = '';
        renderSelectedMembers();
    }

    function removeFromGroup(userId) {
        selectedMembers = selectedMembers.filter(m => m.id !== userId);
        if (!selectedMembers.length) {
            document.getElementById('chat-new-group-section').style.display = 'none';
        }
        renderSelectedMembers();
    }

    function renderSelectedMembers() {
        document.getElementById('chat-selected-members').innerHTML = selectedMembers.map(m => `
            <span class="chat-member-tag">
                ${escHtml(m.name)}
                <span class="remove" onclick="ChatApp.removeFromGroup(${m.id})">✕</span>
            </span>
        `).join('');
    }

    async function createGroup() {
        const name = document.getElementById('chat-group-name').value.trim();
        if (!name) { alert('Введите название группы'); return; }
        if (!selectedMembers.length) { alert('Добавьте участников'); return; }

        try {
            const res = await fetch('/api/chat/group/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
                body: JSON.stringify({ name, member_ids: selectedMembers.map(m => m.id) }),
            });
            const data = await res.json();
            if (data.room_id) {
                openRoom(data.room_id, data.name, 'GROUP');
            }
        } catch (e) {
            console.error('Chat: createGroup error', e);
        }
    }

    // ── Room Info ──

    async function showRoomInfo() {
        showScreen('chat-info-screen');

        try {
            const res = await fetch(`/api/chat/rooms/${currentRoomId}/members/`);
            const data = await res.json();
            const el = document.getElementById('chat-members-list');
            el.innerHTML = (data.members || []).map(m => `
                <div class="chat-member-item">
                    <div class="chat-member-avatar">${m.name.charAt(0)}</div>
                    <div>
                        <div class="chat-member-info-name">${escHtml(m.name)} ${m.role === 'OWNER' ? '👑' : ''}</div>
                        <div class="chat-member-info-lab">${escHtml(m.lab)}</div>
                    </div>
                </div>
            `).join('');

            // Кнопка "Покинуть" — только для GROUP
            document.getElementById('chat-leave-area').style.display =
                currentRoomType === 'GROUP' ? '' : 'none';
        } catch (e) {
            console.error('Chat: showRoomInfo error', e);
        }
    }

    async function leaveRoom() {
        if (!confirm('Покинуть чат?')) return;
        try {
            await fetch(`/api/chat/rooms/${currentRoomId}/leave/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': CSRF },
            });
            backToRooms();
        } catch (e) {
            console.error('Chat: leaveRoom error', e);
        }
    }

    // ── Navigation ──

    function backToRooms() {
        disconnectWs();
        currentRoomId = null;
        showScreen('chat-rooms-screen');
        loadRooms();
    }

    function backToMessages() {
        showScreen('chat-messages-screen');
    }

    // ── Unread Badge (polling) ──

    function startUnreadPolling() {
        updateUnreadBadge();
        unreadPollInterval = setInterval(updateUnreadBadge, 15000);
    }

    function stopUnreadPolling() {
        clearInterval(unreadPollInterval);
    }

    async function updateUnreadBadge() {
        try {
            const res = await fetch('/api/chat/unread/');
            const data = await res.json();
            const badge = document.getElementById('chat-fab-badge');
            if (data.unread > 0) {
                badge.textContent = data.unread > 99 ? '99+' : data.unread;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }
        } catch (e) {}
    }

    function updateRoomPreview(roomId, text, sender, time) {
        const room = rooms.find(r => r.id === roomId);
        if (room) {
            room.last_message = { text: text.substring(0, 80), sender, time };
        }
    }

    // ── Utils ──

    function escHtml(s) {
        if (!s) return '';
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function escJs(s) {
        if (!s) return '';
        return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    // ── Init: запуск polling бейджа сразу при загрузке страницы ──
    updateUnreadBadge();
    setInterval(updateUnreadBadge, 30000);

    // ── Public API ──
    return {
        toggle, close, openRoom, backToRooms, backToMessages,
        sendMessage, onKeyDown, autoResize,
        showNewChat, searchUsers, startDirect,
        addToGroup, removeFromGroup, createGroup,
        showRoomInfo, leaveRoom, loadMore,
    };
})();
</script>
