<!-- core/templates/core/_maintenance_banner.html -->

{% comment %}
  Подключать в base.html перед </body>:
  {% include "core/_maintenance_banner.html" %}
{% endcomment %}

<!-- ═══════════════════════════════════════════════════
     КНОПКА "Техработы" — только для сисадмина
     ═══════════════════════════════════════════════════ -->
{% if user.role == 'SYSADMIN' %}
<button id="maintenanceAdminBtn"
        class="maintenance-admin-btn"
        title="Уведомить о технических работах"
        onclick="document.getElementById('maintenanceModal').style.display='flex'">
    🔧
</button>
{% endif %}

<!-- ═══════════════════════════════════════════════════
     МОДАЛКА ДЛЯ СИСАДМИНА — ввод минут
     ═══════════════════════════════════════════════════ -->
<div id="maintenanceModal" class="mnt-modal-overlay" style="display:none">
  <div class="mnt-modal">
    <div class="mnt-modal-header">
      <h3>⚙️ Уведомление о техработах</h3>
      <button class="mnt-modal-close"
              onclick="document.getElementById('maintenanceModal').style.display='none'">✕</button>
    </div>
    <div class="mnt-modal-body">
      <label for="mntMinutes">Через сколько минут начнутся работы:</label>
      <input type="number" id="mntMinutes" min="1" max="1440" value="10"
             class="mnt-input" placeholder="10">

      <label for="mntMessage" style="margin-top:12px">Сообщение (необязательно):</label>
      <input type="text" id="mntMessage" class="mnt-input"
             placeholder="Например: Обновление системы">

      <div id="mntError" class="mnt-error" style="display:none"></div>
    </div>
    <div class="mnt-modal-footer">
      <button id="mntCancelActiveBtn" class="btn-mnt-cancel" style="display:none"
              onclick="cancelMaintenance()">
        Отменить активное
      </button>
      <button class="btn-mnt-secondary"
              onclick="document.getElementById('maintenanceModal').style.display='none'">
        Закрыть
      </button>
      <button class="btn-mnt-primary" onclick="sendMaintenanceNotify()">
        🔔 Уведомить всех
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     БАННЕР-ПРЕДУПРЕЖДЕНИЕ — для ВСЕХ пользователей
     ═══════════════════════════════════════════════════ -->
<div id="maintenanceBanner" class="mnt-banner" style="display:none">
  <div class="mnt-banner-content">
    <span class="mnt-banner-icon">⚠️</span>
    <span class="mnt-banner-text">
      <strong>Внимание!</strong>
      Через <span id="mntCountdown">—</span> мин. начнутся технические работы.
      <span id="mntBannerMsg"></span>
      <br>Пожалуйста, <strong>сохраните все несохранённые данные</strong>.
    </span>
    <button class="mnt-banner-dismiss" onclick="dismissBanner()" title="Скрыть">✕</button>
  </div>
  <div class="mnt-banner-progress">
    <div id="mntProgressBar" class="mnt-banner-progress-bar"></div>
  </div>
</div>


<style>
/* ═══════════════════════════════════════
   Кнопка сисадмина — фиксированная
   ═══════════════════════════════════════ */
.maintenance-admin-btn {
    position: fixed;
    bottom: 80px;
    right: 24px;
    z-index: 9000;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid #e67e22;
    background: #fff3e0;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
}
.maintenance-admin-btn:hover {
    background: #ffe0b2;
    transform: scale(1.1);
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

/* ═══════════════════════════════════════
   Модалка сисадмина
   ═══════════════════════════════════════ */
.mnt-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
}
.mnt-modal {
    background: #fff;
    border-radius: 12px;
    width: 440px;
    max-width: 90vw;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    overflow: hidden;
}
.mnt-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: #d55535da;
    color: #fff;
}
.mnt-modal-header h3 {
    margin: 0;
    font-size: 16px;
}
.mnt-modal-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}
.mnt-modal-body {
    padding: 20px;
    display: flex;
    flex-direction: column;
}
.mnt-modal-body label {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 6px;
    color: #333;
}
.mnt-input {
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
}
.mnt-input:focus {
    border-color: #f39c12;
    box-shadow: 0 0 0 2px rgba(243,156,18,0.15);
}
.mnt-error {
    margin-top: 10px;
    padding: 8px 12px;
    background: #fdecea;
    color: #dd5243;
    border-radius: 6px;
    font-size: 13px;
}
.mnt-modal-footer {
    padding: 12px 20px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    border-top: 1px solid #eee;
}
.btn-mnt-primary {
    padding: 10px 20px;
    background:#ff6363;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
}
.btn-mnt-primary:hover { background: #ff7913d2; }
.btn-mnt-secondary {
    padding: 10px 20px;
    background: #ecf0f1;
    color: #333;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}
.btn-mnt-secondary:hover { background: #ddd; }
.btn-mnt-cancel {
    padding: 10px 20px;
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    margin-right: auto;
}
.btn-mnt-cancel:hover { background: #de5b4c; }

/* ═══════════════════════════════════════
   Баннер-предупреждение (для всех)
   ═══════════════════════════════════════ */
.mnt-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 11000;
    background: linear-gradient(135deg, #ff3c27 0%, #ff6643a7 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    animation: mntSlideDown 0.5s ease;
}
@keyframes mntSlideDown {
    from { transform: translateY(-100%); }
    to   { transform: translateY(0); }
}
.mnt-banner-content {
    display: flex;
    align-items: center;
    padding: 14px 20px;
    gap: 12px;
}
.mnt-banner-icon {
    font-size: 28px;
    flex-shrink: 0;
    animation: mntPulse 1.5s infinite;
}
@keyframes mntPulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.2); }
}
.mnt-banner-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.5;
}
.mnt-banner-dismiss {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 4px;
    flex-shrink: 0;
}
.mnt-banner-dismiss:hover {
    background: rgba(255,255,255,0.3);
}
.mnt-banner-progress {
    height: 4px;
    background: rgba(255,255,255,0.2);
}
.mnt-banner-progress-bar {
    height: 100%;
    background: #f1c40f;
    width: 100%;
    transition: width 1s linear;
}

/* Баннер в критической зоне (< 2 мин) */
.mnt-banner.critical {
    background: linear-gradient(135deg, #8e0000 0%, #c0392b 100%);
    animation: mntSlideDown 0.5s ease, mntFlash 1s infinite;
}
@keyframes mntFlash {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.85; }
}
</style>


<script>
(function() {
    // ═══════════════════════════════════════
    // Переменные
    // ═══════════════════════════════════════
    let mntWs = null;
    let mntCountdownInterval = null;
    let mntScheduledAt = null;
    let mntTotalSeconds = 0;
    let mntNoticeId = null;

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value
                      || '{{ csrf_token }}';

    // ═══════════════════════════════════════
    // WebSocket подключение
    // ═══════════════════════════════════════
    function connectMaintenanceWs() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${protocol}//${location.host}/ws/maintenance/`;

        mntWs = new WebSocket(url);

        mntWs.onmessage = function(e) {
            const data = JSON.parse(e.data);

            if (data.type === 'maintenance_warning') {
                showMaintenanceBanner(data.minutes, data.message, data.scheduled_at, data.notice_id);
            }
            else if (data.type === 'maintenance_cancel') {
                hideMaintenanceBanner();
            }
        };

        mntWs.onclose = function() {
            // Реконнект через 5 секунд
            setTimeout(connectMaintenanceWs, 5000);
        };

        mntWs.onerror = function() {
            mntWs.close();
        };
    }

    // Подключаемся при загрузке страницы
    connectMaintenanceWs();

    // ═══════════════════════════════════════
    // Проверка при загрузке (если WS ещё не подключён)
    // ═══════════════════════════════════════
    fetch('/api/maintenance/status/')
        .then(r => r.json())
        .then(data => {
            if (data.active) {
                const minutesLeft = Math.ceil(data.seconds_remaining / 60);
                showMaintenanceBanner(
                    minutesLeft,
                    data.message,
                    data.scheduled_at,
                    data.notice_id
                );
            }
        })
        .catch(() => {});

    // ═══════════════════════════════════════
    // Показать баннер
    // ═══════════════════════════════════════
    function showMaintenanceBanner(minutes, message, scheduledAt, noticeId) {
        const banner = document.getElementById('maintenanceBanner');
        const countdownEl = document.getElementById('mntCountdown');
        const msgEl = document.getElementById('mntBannerMsg');
        const progressBar = document.getElementById('mntProgressBar');

        mntScheduledAt = new Date(scheduledAt);
        mntTotalSeconds = minutes * 60;
        mntNoticeId = noticeId;

        if (message) {
            msgEl.textContent = '— ' + message;
        } else {
            msgEl.textContent = '';
        }

        banner.style.display = 'block';
        banner.classList.remove('critical');

        // Показать кнопку «Отменить» в модалке сисадмина
        const cancelBtn = document.getElementById('mntCancelActiveBtn');
        if (cancelBtn) cancelBtn.style.display = 'inline-block';

        // Обратный отсчёт
        if (mntCountdownInterval) clearInterval(mntCountdownInterval);

        function updateCountdown() {
            const now = new Date();
            const diff = Math.max(0, Math.floor((mntScheduledAt - now) / 1000));
            const mins = Math.floor(diff / 60);
            const secs = diff % 60;

            if (diff <= 0) {
                countdownEl.textContent = '0';
                banner.classList.add('critical');
                clearInterval(mntCountdownInterval);

                // Через 2 секунды поменять текст
                setTimeout(() => {
                    document.querySelector('.mnt-banner-text').innerHTML =
                        '<strong>🛑 Технические работы начались!</strong><br>' +
                        'Система может быть временно недоступна.';
                }, 2000);
                return;
            }

            // Формат: "5 мин. 30 сек." или "30 сек."
            if (mins > 0) {
                countdownEl.textContent = `${mins} мин. ${secs.toString().padStart(2, '0')} сек.`;
            } else {
                countdownEl.textContent = `${secs} сек.`;
            }

            // Прогресс-бар
            const elapsed = mntTotalSeconds - diff;
            const pct = Math.max(0, 100 - (elapsed / mntTotalSeconds * 100));
            progressBar.style.width = pct + '%';

            // Критическая зона: < 2 мин
            if (diff <= 120) {
                banner.classList.add('critical');
            }
        }

        updateCountdown();
        mntCountdownInterval = setInterval(updateCountdown, 1000);

        // Звуковой сигнал (если разрешён)
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.15;
            osc.start();
            setTimeout(() => { osc.stop(); ctx.close(); }, 300);
        } catch(e) {}
    }

    // ═══════════════════════════════════════
    // Скрыть баннер
    // ═══════════════════════════════════════
    function hideMaintenanceBanner() {
        const banner = document.getElementById('maintenanceBanner');
        banner.style.display = 'none';
        banner.classList.remove('critical');
        if (mntCountdownInterval) {
            clearInterval(mntCountdownInterval);
            mntCountdownInterval = null;
        }
        mntNoticeId = null;

        const cancelBtn = document.getElementById('mntCancelActiveBtn');
        if (cancelBtn) cancelBtn.style.display = 'none';
    }

    // «Скрыть» по кнопке ✕ — только визуально (не отменяет работы)
    window.dismissBanner = function() {
        document.getElementById('maintenanceBanner').style.display = 'none';
    };

    // ═══════════════════════════════════════
    // Сисадмин: отправить уведомление
    // ═══════════════════════════════════════
    window.sendMaintenanceNotify = function() {
        const minutes = parseInt(document.getElementById('mntMinutes').value, 10);
        const message = document.getElementById('mntMessage').value.trim();
        const errorEl = document.getElementById('mntError');

        if (!minutes || minutes < 1 || minutes > 1440) {
            errorEl.textContent = 'Укажите от 1 до 1440 минут';
            errorEl.style.display = 'block';
            return;
        }

        errorEl.style.display = 'none';

        fetch('/api/maintenance/notify/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({ minutes, message }),
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                document.getElementById('maintenanceModal').style.display = 'none';
                // Баннер появится через WebSocket
            } else {
                errorEl.textContent = data.error || 'Ошибка';
                errorEl.style.display = 'block';
            }
        })
        .catch(err => {
            errorEl.textContent = 'Ошибка сети';
            errorEl.style.display = 'block';
        });
    };

    // ═══════════════════════════════════════
    // Сисадмин: отменить уведомление
    // ═══════════════════════════════════════
    window.cancelMaintenance = function() {
        fetch('/api/maintenance/cancel/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
        })
        .then(r => r.json())
        .then(data => {
            if (data.ok) {
                hideMaintenanceBanner();
                document.getElementById('maintenanceModal').style.display = 'none';
            }
        })
        .catch(() => {});
    };

})();
</script>
