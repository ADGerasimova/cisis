{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смена пароля — CISIS</title>
    <link rel="stylesheet" href="{% static 'core/css/journals.css' %}">
    <style>
        body { display: flex; justify-content: center; align-items: flex-start; }
        .container { max-width: 460px; width: 100%; margin-top: 40px; }
        .card .form-group { margin-bottom: 16px; }
        .card .form-group input { padding: 10px 12px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="msg msg-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="header">
        <div class="header-left">
            <h1>🔒 Смена пароля</h1>
        </div>
        <div class="header-right">
            <a href="{% url 'workspace_home' %}" class="back-btn">← Назад</a>
        </div>
    </div>

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Текущий пароль</label>
                <input type="password" name="old_password" required autofocus>
            </div>
            <div class="form-group">
                <label>Новый пароль</label>
                <input type="password" name="new_password" required
                       placeholder="Минимум 4 символа">
            </div>
            <div class="form-group">
                <label>Подтверждение нового пароля</label>
                <input type="password" name="confirm_password" required>
            </div>
            <div class="form-actions">
                <a href="{% url 'workspace_home' %}" class="btn btn-secondary">Отмена</a>
                <button type="submit" class="btn btn-primary">Сменить пароль</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
