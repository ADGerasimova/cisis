{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CISIS — Вход</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px;
            -webkit-font-smoothing: antialiased;
            background: linear-gradient(-45deg,
                #d5dff5, #c8e0fc, #e2d5f5,
                #cceee2, #f5e0cc, #d5dff5);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 100% 25%; }
            50%  { background-position: 50% 100%; }
            75%  { background-position: 0% 75%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 5% 5%, rgba(74,144,226,0.1) 0%, transparent 55%),
                radial-gradient(ellipse 50% 45% at 95% 15%, rgba(139,92,246,0.08) 0%, transparent 50%),
                radial-gradient(ellipse 55% 40% at 50% 95%, rgba(6,182,212,0.06) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .login-card {
            position: relative; z-index: 1;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.4) inset;
            padding: 44px 40px;
            width: 100%; max-width: 400px;
            animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card h1 {
            text-align: center; font-size: 28px; font-weight: 700;
            color: #1a2332; margin-bottom: 6px; letter-spacing: -0.3px;
        }

        .login-card .subtitle {
            text-align: center; color: #5a6a7e;
            font-size: 12px; margin-bottom: 20px;
        }

        .field { margin-bottom: 18px; }

        .field label {
            display: block; font-size: 13px; font-weight: 600;
            color: #3d4f63; margin-bottom: 6px;
        }

        .field input {
            width: 100%; padding: 11px 14px;
            border: 1px solid rgba(0,0,0,0.12); border-radius: 10px;
            font-size: 15px; font-family: inherit;
            background: rgba(255,255,255,0.7);
            transition: all 0.2s;
        }

        .field input:focus {
            outline: none; border-color: #4a90e2;
            box-shadow: 0 0 0 3px rgba(74,144,226,0.15);
            background: rgba(255,255,255,0.9);
        }

        .error {
            background: rgba(239,68,68,0.08); color: #dc2626;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px; padding: 10px 14px;
            font-size: 13px; margin-bottom: 18px;
        }

        .forgot {
            font-size: 12px; color: #5a6a7e;
            margin-bottom: 18px; text-align: right;
            cursor: pointer; user-select: none;
            transition: color 0.2s;
        }
        .forgot:hover { color: #4a90e2; }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 44px;
        }

        .toggle-password {
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: #5a6a7e; padding: 4px;
            display: flex; align-items: center; justify-content: center;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: #4a90e2; }

        .btn {
            width: 100%; padding: 12px;
            background: #87acd6; color: #fff;
            border: none; border-radius: 10px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { background: #3578c9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,226,0.3); }
        .btn:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 style="display: flex; align-items: center; justify-content: center; gap: 10px;">
            <img src="{% static 'core/img/logo.png' %}" alt="CISIS" style="height: 28px;">
                ЦИСИС ФМТ
        </h1>
        <p class="subtitle">Центр испытаний, сертификации и стандартизации функциональных материалов и технологий</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="field">
                <label for="username">Логин</label>
                <input type="text" id="username" name="username"
                       value="{{ username }}" autofocus required>
            </div>
            <div class="field">
                <label for="password">Пароль</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Показать пароль">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
            </div>
            <p class="forgot"
               onclick="this.textContent = 'Обратитесь к руководителю или в техотдел'">
                Забыли пароль?
            </p>
            <button type="submit" class="btn">Войти</button>
        </form>
    </div>
{% include 'core/_notifications.html' %}
{% include 'core/_chat_sidebar.html' %}
<script>
function togglePassword() {
    const input = document.getElementById('password');
    const eyeOn = document.getElementById('eye-icon');
    const eyeOff = document.getElementById('eye-off-icon');
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    eyeOn.style.display = isHidden ? 'none' : 'block';
    eyeOff.style.display = isHidden ? 'block' : 'none';
}
</script>
</body>
</html>
