{# ═══ Уведомления о задачах — подключить перед </body> ═══ #}
{# {% include 'core/_notifications.html' %}                  #}

<style>
#toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    pointer-events: none;
    max-width: 380px;
    width: 100%;
}
.notif-toast {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
    cursor: pointer;
    pointer-events: auto;
    transform: translateX(120%);
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    border-left: 4px solid #6b7280;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
}
.notif-toast.show { transform: translateX(0); opacity: 1; }
.notif-toast.hide { transform: translateX(120%); opacity: 0; }
.notif-toast:hover {
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.16), 0 4px 12px rgba(0, 0, 0, 0.08);
    transform: translateX(-4px);
}
.notif-toast-high   { border-left-color: #ef4444; }
.notif-toast-medium { border-left-color: #f59e0b; }
.notif-toast-low    { border-left-color: #22c55e; }
.notif-toast-info   { border-left-color: #4a90e2; }
.notif-toast-icon { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 1px; }
.notif-toast-body { flex: 1; min-width: 0; }
.notif-toast-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px; color: #8d99a8; margin-bottom: 3px;
}
.notif-toast-title {
    font-size: 13px; font-weight: 600; color: #1a2332; line-height: 1.35;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.notif-toast-close {
    background: none; border: none; font-size: 18px; line-height: 1;
    color: #8d99a8; cursor: pointer; padding: 0 2px; flex-shrink: 0; transition: color 0.15s;
}
.notif-toast-close:hover { color: #ef4444; }
@media (max-width: 480px) {
    #toast-container { right: 10px; left: 10px; max-width: 100%; }
}
</style>

<div id="toast-container"></div>

<script>
(function() {
    'use strict';

    var POLL_INTERVAL = 30000;
    var TOAST_DURATION = 8000;
    var API_URL = '/workspace/tasks/notifications/';
    var TASKS_URL = '/workspace/tasks/';
    var STORAGE_KEY = 'cisis_notif_since';
    var MAX_TOASTS = 3;
    var container = null;
    var activeToasts = 0;

    function init() {
        container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            document.body.appendChild(container);
        }
        setTimeout(poll, 3000);
        setInterval(poll, POLL_INTERVAL);

        // При возврате на вкладку — сразу проверяем
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) poll();
        });
    }

    function poll() {
        // Опрашиваем только если вкладка активна
        if (document.hidden) return;

        var since = localStorage.getItem(STORAGE_KEY) || '';
        fetch(API_URL + '?since=' + encodeURIComponent(since), { credentials: 'same-origin' })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data) return;
                localStorage.setItem(STORAGE_KEY, data.server_time);
                updateBadge(data.total_open);
                if (data.tasks && data.tasks.length > 0 && since) {
                    var toShow = data.tasks.slice(0, MAX_TOASTS);
                    var remaining = data.tasks.length - toShow.length;
                    toShow.forEach(function(task, i) {
                        setTimeout(function() { showToast(task); }, i * 400);
                    });
                    if (remaining > 0) {
                        setTimeout(function() { showSummaryToast(remaining); }, toShow.length * 400);
                    }
                }
            })
            .catch(function() {});
    }

    function showToast(task) {
        if (activeToasts >= MAX_TOASTS + 1) return;
        var toast = document.createElement('div');
        toast.className = 'notif-toast notif-toast-' + task.priority.toLowerCase();

        var link = TASKS_URL;
        if (task.entity_type === 'sample' && task.entity_id)
            link = '/workspace/samples/' + task.entity_id + '/';
        else if (task.entity_type === 'equipment' && task.entity_id)
            link = '/workspace/equipment/' + task.entity_id + '/';

        toast.innerHTML =
            '<div class="notif-toast-icon">' + getIcon(task.type) + '</div>' +
            '<div class="notif-toast-body">' +
                '<div class="notif-toast-label">' + esc(task.type_label) + '</div>' +
                '<div class="notif-toast-title">' + esc(task.title) + '</div>' +
            '</div>' +
            '<button class="notif-toast-close">&times;</button>';

        toast.addEventListener('click', function(e) {
            if (!e.target.closest('.notif-toast-close')) window.location.href = link;
        });
        toast.querySelector('.notif-toast-close').addEventListener('click', function(e) {
            e.stopPropagation(); removeToast(toast);
        });

        container.appendChild(toast);
        activeToasts++;
        requestAnimationFrame(function() { toast.classList.add('show'); });
        setTimeout(function() { removeToast(toast); }, TOAST_DURATION);
    }

    function showSummaryToast(count) {
        var toast = document.createElement('div');
        toast.className = 'notif-toast notif-toast-info';
        toast.innerHTML =
            '<div class="notif-toast-icon">📋</div>' +
            '<div class="notif-toast-body">' +
                '<div class="notif-toast-title">И ещё ' + count + ' ' + plur(count) + '</div>' +
            '</div>' +
            '<button class="notif-toast-close">&times;</button>';
        toast.addEventListener('click', function(e) {
            if (!e.target.closest('.notif-toast-close')) window.location.href = TASKS_URL;
        });
        toast.querySelector('.notif-toast-close').addEventListener('click', function(e) {
            e.stopPropagation(); removeToast(toast);
        });
        container.appendChild(toast);
        activeToasts++;
        requestAnimationFrame(function() { toast.classList.add('show'); });
        setTimeout(function() { removeToast(toast); }, TOAST_DURATION);
    }

    function removeToast(toast) {
        if (!toast || !toast.parentNode) return;
        toast.classList.remove('show');
        toast.classList.add('hide');
        setTimeout(function() {
            if (toast.parentNode) toast.parentNode.removeChild(toast);
            activeToasts = Math.max(0, activeToasts - 1);
        }, 300);
    }

    function updateBadge(count) {
        document.querySelectorAll('[data-notif-badge]').forEach(function(el) {
            if (count > 0) { el.textContent = count > 99 ? '99+' : count; el.style.display = ''; }
            else { el.style.display = 'none'; }
        });
    }

    function getIcon(type) {
        return {'TESTING':'🧪','MANUFACTURING':'🔧','METROLOGY':'📐',
                'VERIFY_REGISTRATION':'📋','ACCEPT_SAMPLE':'📥','MANUAL':'📌'}[type] || '📌';
    }

    function plur(n) {
        var a = Math.abs(n) % 100;
        if (a >= 11 && a <= 19) return 'задач';
        var l = a % 10;
        return l === 1 ? 'задача' : (l >= 2 && l <= 4 ? 'задачи' : 'задач');
    }

    function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
})();
</script>
