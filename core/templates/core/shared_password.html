<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Введите пароль — CISIS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f0f4f8; color: #1e293b;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 40px; max-width: 400px; width: 100%;
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  .title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .subtitle { color: #64748b; font-size: 14px; margin-bottom: 24px; }
  .input-wrap { margin-bottom: 16px; }
  input[type="password"] {
    width: 100%; padding: 12px 16px; border: 1px solid #e2e8f0;
    border-radius: 10px; font-size: 15px; text-align: center;
    outline: none; transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: #007bff; }
  .submit-btn {
    width: 100%; background: #007bff; color: #fff; border: none;
    border-radius: 10px; padding: 12px; font-size: 15px; font-weight: 500;
    cursor: pointer; transition: background 0.15s;
  }
  .submit-btn:hover { background: #0056d4; }
  .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; }
  .logo { margin-bottom: 20px; font-size: 13px; color: #94a3b8; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">ЦИСИС ФМТ</div>
  <div class="icon">🔒</div>
  <div class="title">Файл защищён паролем</div>
  <div class="subtitle">Введите пароль для доступа к файлу</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="post" action="/shared/{{ token }}/">
    {% csrf_token %}
    <div class="input-wrap">
      <input type="password" name="password" placeholder="Пароль" autofocus>
    </div>
    <button type="submit" class="submit-btn">Продолжить</button>
  </form>
</div>
</body>
</html>
